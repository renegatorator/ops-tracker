<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none" role="img" aria-label="Ops Tracker">
  <style>
    .ring { stroke: #1C2A3A; }
    .line { stroke: #1C2A3A; }
    .dot  { fill: #3B82F6; }
    @media (prefers-color-scheme: dark) {
      .ring { stroke: #CBD5E1; }
      .line { stroke: #CBD5E1; }
      .dot  { fill: #60A5FA; }
    }
  </style>
  <!-- Outer hexagon ring -->
  <path class="ring" d="M16 2L28.124 9V23L16 30L3.876 23V9L16 2Z" stroke-width="2" fill="none"/>
  <!-- Inner cross -->
  <line class="line" x1="16" y1="8" x2="16" y2="24" stroke-width="2" stroke-linecap="round"/>
  <line class="line" x1="8" y1="16" x2="24" y2="16" stroke-width="2" stroke-linecap="round"/>
  <!-- Nodes -->
  <circle class="dot" cx="16" cy="8"  r="2.5"/>
  <circle class="dot" cx="16" cy="24" r="2.5"/>
  <circle class="dot" cx="8"  cy="16" r="2.5"/>
  <circle class="dot" cx="24" cy="16" r="2.5"/>
</svg>
